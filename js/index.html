<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Holerite Digital 2026</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1976D2, #0D47A1);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    width: 380px;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  h1 {
    text-align: center;
    color: #0D47A1;
    margin-bottom: 20px;y
    font-size: 22px;
  }

  .grupo {
    margin-bottom: 15px;
  }

  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #1976D2;
    font-size: 14px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
    box-sizing: border-box;
  }

  input:disabled {
    background: #E3F2FD;
    font-weight: bold;
  }

  .botoes {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
  }

  button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }

  .calcular {
    background: #1976D2;
    color: white;
  }

  .calcular:hover {
    background: #0D47A1;
  }

  .limpar {
    background: #90CAF9;
    color: #0D47A1;
  }

  .limpar:hover {
    background: #64B5F6;
  }

  /* RESULTADO FINAL DESTACADO */
  .resultado-final {
    margin-top: 10px;
    padding: 16px;
    background-color: #d6e4ef;
    border-left: 5px solid #0D47A1;
    border-radius: 10px;
    text-align: center;
  }

  .resultado-final strong {
    display: block;
    font-size: 14px;
    margin-bottom: 5px;
    color: #333;
  }

  .resultado-final span {
    display: block;
    font-size: 20px;
    font-weight: bold;
    color: #0D47A1;
  }

  /* MENSAGEM */
  .resultado {
    margin-top: 12px;
    padding: 10px;
    background: #E3F2FD;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    color: #0D47A1;
    display: none;
  }
</style>
</head>

<body>

<div class="card">
  <h1><strong>Holerite Digital 2026</strong></h1>

  <div class="grupo">
    <label><strong>Salário Bruto (R$)</strong></label>
    <input type="number" id="salario" placeholder="Ex: 6500">
  </div>

  <div class="grupo">
    <label><strong> Desconto INSS (Tabela 2026)</strong></label>
    <input type="text" id="inss" disabled>
  </div>

  <div class="grupo">
    <label><strong>Imposto de Renda (Isenção até 5K)</strong></label>
    <input type="text" id="irrf" disabled>
  </div>

  <div class="botoes">
    <button class="calcular" onclick="calcular()">Calcular Agora</button>
    <button class="limpar" onclick="limpar()">Limpar Tudo</button>
  </div>

  <!-- RESULTADO DESTACADO -->
  <div class="resultado-final">
    <strong></strong>Salário Líquido Final:</strong>
    <span id="liquido">R$ 0,00</span>
  </div>

  <div id="mensagem" class="resultado"></div>
</div>

<script>
function formatarMoeda(valor) {
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function calcular() {
  let salario = parseFloat(document.getElementById("salario").value);

  if (isNaN(salario) || salario <= 0) {
    alert("Digite um salário válido!");
    return;
  }

  let inss = calcularINSS(salario);
  let base = salario - inss;
  let irrf = calcularIRRF(base);
  let liquido = salario - inss - irrf;

  document.getElementById("inss").value = formatarMoeda(inss);
  document.getElementById("irrf").value = formatarMoeda(irrf);
  document.getElementById("liquido").innerText = formatarMoeda(liquido);

  let msg = document.getElementById("mensagem");

  if (irrf === 0) {
    msg.style.display = "block";
    msg.innerText = "Você está isento de Imposto de Renda em 2026!";
  } else {
    msg.style.display = "none";
  }
}

function limpar() {
  document.getElementById("salario").value = "";
  document.getElementById("inss").value = "";
  document.getElementById("irrf").value = "";
  document.getElementById("liquido").innerText = "R$ 0,00";
  document.getElementById("mensagem").style.display = "none";
}

function calcularINSS(salario) {
  let teto = 8475.55;
  let base = Math.min(salario, teto);
  let inss = 0;

  if (base <= 1621) {
    inss = base * 0.075;
  } else if (base <= 2902.84) {
    inss = (1621 * 0.075) + ((base - 1621) * 0.09);
  } else if (base <= 4354.27) {
    inss = (1621 * 0.075) + (1281.84 * 0.09) + ((base - 2902.84) * 0.12);
  } else {
    inss = (1621 * 0.075) + (1281.84 * 0.09) + (1451.43 * 0.12) + ((base - 4354.27) * 0.14);
  }

  return Math.min(inss, 988.09);
}

function calcularIRRF(base) {
  if (base <= 5000) return 0;
  return (base - 5000) * 0.275;
}
</script>

</body>
</html>
